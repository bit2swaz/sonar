[toolchain]
anchor_version = "0.32.1"
solana_version = "3.0.13"
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.devnet]
sonar = "Gf7RSZYmfNJ5kv2AJvcv5rjCANP6ePExJR19D91MECLY"

[programs.localnet]
echo_callback = "J7jsJVQz6xbWFhyxRbzk7nH5ALhStztUNR1nPupnyjxS"
historical_avg_client = "2GNQ6iMwsH5RLJQ5Fhj5ieHmMhzgCT3y7DKx8tvspqJd"
