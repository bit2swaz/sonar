[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
# Allow confidence threshold — some crates lack SPDX identifiers.
confidence-threshold = 0.8

[bans]
# Warn on duplicate versions; upgrade workspace to resolve.
multiple-versions = "warn"
# Deny packages known to be insecure or abandoned.
wildcards = "warn"
highlight = "all"

[advisories]
# Crates with known CVEs are denied (default in cargo-deny 0.14+).
# unmaintained/unsound/notice severity keys were removed in 0.14; use ignore list below.
yanked = "deny"
ignore = []

[sources]
# Only allow crates from crates.io and our own git sources.
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
