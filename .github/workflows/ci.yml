      - name: Install npm dependencies
        run: npm install

      - name: Build Rust binaries
        run: |
          cargo build --bins
          cargo build -p sonar-indexer --lib

      - name: Build Anchor program
        run: anchor build

      - name: Make verification script executable
        run: chmod +x scripts/verify-demo.sh

      - name: Run automated demo verification
        run: scripts/verify-demo.sh

      - name: Print demo logs on failure
        if: failure()
