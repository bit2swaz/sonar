services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sonar}
      POSTGRES_USER: ${POSTGRES_USER:-sonar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sonar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  coordinator:
    build:
      context: .
      dockerfile: docker/coordinator.Dockerfile
    image: sonar/coordinator:local
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SONAR_CHAIN_ID: ${SONAR_CHAIN_ID:-devnet}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://solana-devnet.core.chainstack.com/51a4443c8b33222e5327f331e007ec91}
      SOLANA_WS_URL: ${SOLANA_WS_URL:-wss://solana-devnet.core.chainstack.com/51a4443c8b33222e5327f331e007ec91}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      HELIUS_RPC_URL: ${HELIUS_RPC_URL:-https://solana-devnet.core.chainstack.com/51a4443c8b33222e5327f331e007ec91}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sonar}:${POSTGRES_PASSWORD:-sonar}@postgres:5432/${POSTGRES_DB:-sonar}
      REDIS_URL: redis://redis:6379
      INDEXER_URL: ${INDEXER_URL:-http://host.docker.internal:8080}
      MOCK_PROVER: ${MOCK_PROVER:-false}
      LOG_LEVEL: ${COORDINATOR_LOG_LEVEL:-info}
      METRICS_PORT: ${COORDINATOR_METRICS_PORT:-9090}
      SP1_PROVING_KEY: ${SP1_PROVING_KEY:-/opt/sonar/artifacts/sp1.key}
      GROTH16_PARAMS: ${GROTH16_PARAMS:-/opt/sonar/artifacts/groth16.params}
    ports:
      - "${COORDINATOR_METRICS_PORT:-9090}:${COORDINATOR_METRICS_PORT:-9090}"
    volumes:
      - ./artifacts:/opt/sonar/artifacts:ro

  prover:
    build:
      context: .
      dockerfile: docker/prover.Dockerfile
    image: sonar/prover:local
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SONAR_CHAIN_ID: ${SONAR_CHAIN_ID:-devnet}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://solana-devnet.core.chainstack.com/51a4443c8b33222e5327f331e007ec91}
      SOLANA_WS_URL: ${SOLANA_WS_URL:-wss://solana-devnet.core.chainstack.com/51a4443c8b33222e5327f331e007ec91}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      HELIUS_RPC_URL: ${HELIUS_RPC_URL:-https://solana-devnet.core.chainstack.com/51a4443c8b33222e5327f331e007ec91}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sonar}:${POSTGRES_PASSWORD:-sonar}@postgres:5432/${POSTGRES_DB:-sonar}
      REDIS_URL: redis://redis:6379
      INDEXER_URL: ${INDEXER_URL:-http://host.docker.internal:8080}
      MOCK_PROVER: ${MOCK_PROVER:-false}
      LOG_LEVEL: ${PROVER_LOG_LEVEL:-info}
      METRICS_PORT: ${PROVER_METRICS_PORT:-9091}
      SP1_PROVER: ${SP1_PROVER:-cpu}
      SP1_PROVING_KEY: ${SP1_PROVING_KEY:-/opt/sonar/artifacts/sp1.key}
      GROTH16_PARAMS: ${GROTH16_PARAMS:-/opt/sonar/artifacts/groth16.params}
    ports:
      - "${PROVER_METRICS_PORT:-9091}:${PROVER_METRICS_PORT:-9091}"
    volumes:
      - ./artifacts:/opt/sonar/artifacts:ro

  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    depends_on:
      coordinator:
        condition: service_started
      prover:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  grafana-data:
