[network]
rpc_url  = "${SOLANA_RPC_URL}"
ws_url   = "${SOLANA_WS_URL}"
chain_id = "devnet"

[strategy]
min_profit_floor_usd  = 0.01
gas_buffer_multiplier = 1.2
max_gas_price_gwei    = 1.0

[rpc]
helius_api_key = "${HELIUS_API_KEY}"
helius_rpc_url = "${HELIUS_RPC_URL}"

[indexer]
geyser_plugin_path = "/opt/sonar/libsonar_indexer.so"
database_url       = "${DATABASE_URL}"
concurrency        = 2
http_port          = 18080

[coordinator]
redis_url                = "${REDIS_URL}"
callback_timeout_seconds = 30
max_concurrent_jobs      = 1
indexer_url              = "http://127.0.0.1:18080"

[prover]
sp1_proving_key_path = "${SP1_PROVING_KEY}"
groth16_params_path  = "${GROTH16_PARAMS}"
# Devnet callbacks need real Groth16 proof bytes; SP1 mock proofs cannot be submitted on-chain.
mock_prover          = false

[observability]
log_level    = "info"
metrics_port = 19090